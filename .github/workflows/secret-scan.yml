name: secret-scan

# ----------------------------------------------------------------------------
# Secret scanning gate for the public 2ndBrain-mogging repo.
#
# Runs on:
#   - every push to main
#   - every pull request targeting main
#   - a daily cron (03:17 UTC) to catch newly-published detection patterns
#
# Two independent jobs run in parallel so a false-negative in one engine
# doesn't hide a real leak caught by the other:
#   1. gitleaks  — custom ruleset in .gitleaks.toml (Morgen, n8n, PII)
#   2. trufflehog — verified-only, fail-closed (no unverified noise)
#
# Permissions are locked to contents:read. No write, no id-token.
# Each job has a 10-minute timeout.
# ----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:17 UTC daily — off-peak, off-the-hour so we don't pile on GH runners
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (custom ruleset)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Full history required so gitleaks can scan every commit, not
          # just the tip. Shallow clones miss historical leaks.
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks with custom config
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          # Point the action at our pinned config. No GITLEAKS_LICENSE is set,
          # which is intentional for an OSS repo under the free tier.
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trufflehog:
    name: trufflehog (verified-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run trufflehog (filesystem mode)
        # HIGH RISK historically ran as @main (moving HEAD of third-party action).
        # Now pinned to v3.94.3 commit SHA. Re-pin manually before bumping — never
        # go back to @main, @master, or any moving tag on a third-party action.
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          # Scan the whole working tree. `--only-verified` suppresses noisy
          # unverified hits; the action wrapper appends `--fail` itself, so
          # adding it here causes "flag 'fail' cannot be repeated" errors.
          path: ./
          extra_args: --only-verified
