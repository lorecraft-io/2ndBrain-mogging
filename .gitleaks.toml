# ============================================================================
# .gitleaks.toml — 2ndBrain-mogging public repo secret scan config
# ----------------------------------------------------------------------------
# Extends gitleaks' default ruleset and adds project-specific custom rules
# for Morgen API keys and n8n PATs. Operator-specific PII rules (owner
# email + private collaborator names) live in a gitignored local-only
# companion config — see the block at the bottom of this file.
#
# Invocation:
#   gitleaks detect --config .gitleaks.toml --no-git
#   gitleaks protect --config .gitleaks.toml --staged
# ============================================================================

title = "2ndBrain-mogging public repo secret scan"

# Pull in the upstream default ruleset (AWS, GitHub, Stripe, GCP, etc.).
# Our custom rules below are additive.
[extend]
useDefault = true

# ----------------------------------------------------------------------------
# Custom rule: Morgen API key
# ----------------------------------------------------------------------------
# Morgen keys seen in the wild as `morgen_<uuid-ish>` plus bearer-token usage
# like `Authorization: Bearer morgen ...`. We pattern-match both.
[[rules]]
id          = "morgen-api"
description = "Morgen API key or bearer token"
regex       = '''(?i)(morgen[_\-][A-Za-z0-9_\-]{16,}|authorization:\s*bearer\s+morgen[A-Za-z0-9_\-\.]{16,})'''
tags        = ["key", "morgen", "critical"]
keywords    = ["morgen"]

# ----------------------------------------------------------------------------
# Custom rule: n8n Personal Access Token
# ----------------------------------------------------------------------------
# n8n PATs are issued as `n8n_api_<base64ish-40+chars>`.
[[rules]]
id          = "n8n-api"
description = "n8n Personal Access Token (PAT)"
regex       = '''n8n_api_[A-Za-z0-9_\-\.]{40,}'''
tags        = ["key", "n8n", "critical"]
keywords    = ["n8n_api_"]

# ----------------------------------------------------------------------------
# Operator-specific PII rules (owner email + private collaborator names)
# ----------------------------------------------------------------------------
# These rules live in a LOCAL-ONLY config so the public repo does not itself
# leak the literal names the rules are protecting. To enable full local
# scanning, copy `.gitleaks.private.toml.example` to `.gitleaks.private.toml`,
# fill in your real patterns, and invoke gitleaks with:
#   gitleaks detect --config .gitleaks.toml --no-git
#   gitleaks detect --config .gitleaks.private.toml --no-git   # additional pass
# The private file is gitignored and must never be committed.

# ============================================================================
# Allowlist — self-referential, docs, and synthetic test data
# ============================================================================
[allowlist]
description = "Allow matches inside this config, placeholder docs, and synthetic fixtures"
paths = [
  '''(^|/)\.gitleaks\.toml$''',
  '''(^|/)docs/placeholder-names\.md$''',
  '''(^|/)tests/fixtures/''',
]
