# ============================================================================
# .gitleaks.toml — 2ndBrain-mogging public repo secret scan config
# ----------------------------------------------------------------------------
# Extends gitleaks' default ruleset and adds project-specific custom rules
# for Morgen API keys, n8n PATs, Nathan's email, and private client names
# that must never surface in a public artifact.
#
# Invocation:
#   gitleaks detect --config .gitleaks.toml --no-git
#   gitleaks protect --config .gitleaks.toml --staged
# ============================================================================

title = "2ndBrain-mogging public repo secret scan"

# Pull in the upstream default ruleset (AWS, GitHub, Stripe, GCP, etc.).
# Our custom rules below are additive.
[extend]
useDefault = true

# ----------------------------------------------------------------------------
# Custom rule: Morgen API key
# ----------------------------------------------------------------------------
# Morgen keys seen in the wild as `morgen_<uuid-ish>` plus bearer-token usage
# like `Authorization: Bearer morgen ...`. We pattern-match both.
[[rules]]
id          = "morgen-api"
description = "Morgen API key or bearer token"
regex       = '''(?i)(morgen[_\-][A-Za-z0-9_\-]{16,}|authorization:\s*bearer\s+morgen[A-Za-z0-9_\-\.]{16,})'''
tags        = ["key", "morgen", "critical"]
keywords    = ["morgen"]

# ----------------------------------------------------------------------------
# Custom rule: n8n Personal Access Token
# ----------------------------------------------------------------------------
# n8n PATs are issued as `n8n_api_<base64ish-40+chars>`.
[[rules]]
id          = "n8n-api"
description = "n8n Personal Access Token (PAT)"
regex       = '''n8n_api_[A-Za-z0-9_\-\.]{40,}'''
tags        = ["key", "n8n", "critical"]
keywords    = ["n8n_api_"]

# ----------------------------------------------------------------------------
# Custom rule: Nathan's email
# ----------------------------------------------------------------------------
# Owner's personal operational email should never appear in the public repo.
[[rules]]
id          = "nathan-email"
description = "Owner email (nate@lorecraft.io) — must be scrubbed from public artifacts"
regex       = '''nate@lorecraft\.io'''
tags        = ["pii", "owner", "critical"]
keywords    = ["nate@lorecraft"]

# ----------------------------------------------------------------------------
# Custom rule: private client / collaborator names
# ----------------------------------------------------------------------------
# Never reference these first names in READMEs, migration notes, release
# notes, or any other public repo artifact. Historical figures sharing
# the first name "<PERSON-C>" (Turing, Kay, Watts) are allowlisted below via
# a negative lookahead in config/nathan.pii; in the gitleaks regex we
# broad-match and rely on the allowlist + manual review.
[[rules]]
id          = "private-client-names"
description = "Private client/collaborator first names — must not appear in public artifacts"
regex       = '''(?i)\b(<person-a>|<person-b>|<person-c>|<person-d>|<person-e>|<person-f>\s?<person-f-surname>|<person-g>\s?<person-g-surname>|<person-h>\s?<person-h-surname>)\b'''
tags        = ["pii", "clients", "critical"]
keywords    = ["<person-a>", "<person-b>", "<person-c>", "<person-d>", "<PERSON-E>", "<person-f-surname>", "<person-g-surname>", "<person-h-surname>"]

# ============================================================================
# Allowlist — self-referential, docs, and synthetic test data
# ============================================================================
[allowlist]
description = "Allow matches inside this config, placeholder docs, and synthetic fixtures"
paths = [
  '''(^|/)\.gitleaks\.toml$''',
  '''(^|/)docs/placeholder-names\.md$''',
  '''(^|/)tests/fixtures/''',
]
# Extra regex allowlist — <PERSON-C> Turing / <PERSON-C> Kay / <PERSON-C> Watts are historical
# figures and are not the private collaborator "<PERSON-C>".
regexes = [
  '''(?i)\balan\s+(turing|kay|watts)\b''',
]
